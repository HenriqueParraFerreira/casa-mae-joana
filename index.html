<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>A Casa da Mãe Joana</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: #14100f;
        height: 100%;
        overflow: hidden;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
      }
      #game {
        width: 100vw;
        height: 100vh;
        height: 100dvh; /* iOS: altura real, sem a barra de endereço */
      }
      #rotate-overlay {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 10;
        background: #14100f;
        color: #ffe08a;
        font-family: 'Courier New', monospace;
        font-weight: bold;
        font-size: 22px;
        text-align: center;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 16px;
      }
      #rotate-overlay .cat { font-size: 64px; }
      canvas {
        image-rendering: pixelated;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <div id="rotate-overlay">
      <div class="cat">🙀</div>
      <div>Gire o aparelho na horizontal<br/>para jogar!</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
